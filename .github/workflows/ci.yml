name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile (no syntax errors)
        run: python -m py_compile scripts/*.py examples/*.py tests/*.py
      - name: Smoke tests (gates gate, failures classify, loop composes)
        run: python tests/smoke.py
      - name: End-to-end reference sweep (zero GPU)
        run: python examples/run_local_sweep.py
